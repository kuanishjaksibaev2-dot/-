<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свадебное Приглашение</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f0e6 0%, #ffffff 50%, #f5f0e6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .card-container {
            perspective: 1500px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 700px;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:hover {
            transform: rotateY(5deg) rotateX(2deg);
        }

        .card-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffffff 0%, #faf9f5 100%);
            border-radius: 20px;
            box-shadow: 
                0 25px 80px rgba(212, 175, 55, 0.25),
                0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 60px rgba(212, 175, 55, 0.05);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 3px solid #d4af37;
            overflow: hidden;
        }

        .card-front::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid #d4af37;
            border-radius: 15px;
            pointer-events: none;
        }

        .corner-ornament {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid #d4af37;
            transform: rotate(45deg);
        }

        .corner-tl { top: 30px; left: 30px; }
        .corner-tr { top: 30px; right: 30px; }
        .corner-bl { bottom: 30px; left: 30px; }
        .corner-br { bottom: 30px; right: 30px; }

        .floral-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #d4af37;
            opacity: 0.6;
        }

        .floral-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            color: #d4af37;
            opacity: 0.6;
        }

        .card-title {
            font-family: 'Great Vibes', cursive;
            font-size: 52px;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            line-height: 1.2;
        }

        .card-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: #8b7355;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: #1a1a1a;
            line-height: 1.3;
            margin: 20px 0;
            font-weight: 600;
        }

        .names .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 48px;
            color: #d4af37;
            margin: 0 10px;
        }

        .wedding-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #d4af37;
            margin: 20px 0;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 25px auto;
        }

        .details {
            margin: 30px 0;
        }

        .detail-item {
            margin-bottom: 20px;
        }

        .detail-icon {
            font-size: 24px;
            color: #d4af37;
            margin-bottom: 8px;
        }

        .detail-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            color: #555;
            line-height: 1.5;
        }

        .detail-text small {
            font-size: 14px;
            color: #888;
        }

        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin: 25px 0;
            font-style: italic;
            font-weight: 400;
        }

        .rsvp-mini {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        .rsvp-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
        }

        .rsvp-phone {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            color: #d4af37;
            font-weight: 600;
            margin-top: 8px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .footer-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: #999;
            letter-spacing: 3px;
        }

        .gold-dust {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #d4af37;
            border-radius: 50%;
            opacity: 0.4;
            animation: sparkle 3s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.5); }
        }

        @media (max-width: 600px) {
            .card-front {
                padding: 40px 25px;
                min-height: 600px;
            }

            .card-title {
                font-size: 42px;
            }

            .names {
                font-size: 32px;
            }

            .names .ampersand {
                font-size: 38px;
            }

            .wedding-date {
                font-size: 22px;
            }

            .corner-ornament {
                width: 35px;
                height: 35px;
            }

            .corner-tl, .corner-tr { top: 25px; }
            .corner-bl, .corner-br { bottom: 25px; }
            .corner-tl, .corner-bl { left: 25px; }
            .corner-tr, .corner-br { right: 25px; }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="card">
            <div class="card-front">
                <div class="floral-top">✿ ❀ ✿</div>
                
                <div class="corner-ornament corner-tl"></div>
                <div class="corner-ornament corner-tr"></div>
                <div class="corner-ornament corner-bl"></div>
                <div class="corner-ornament corner-br"></div>
                
                <div class="gold-dust" style="top: 15%; left: 20%;"></div>
                <div class="gold-dust" style="top: 25%; right: 15%; animation-delay: 1s;"></div>
                <div class="gold-dust" style="bottom: 30%; left: 25%; animation-delay: 2s;"></div>
                <div class="gold-dust" style="bottom: 20%; right: 20%; animation-delay: 1.5s;"></div>
                
                <div class="card-title">Wedding</div>
                <div class="card-subtitle">Приглашение</div>
                
                <div class="names">
                    Александр <span class="ampersand">&</span> Мария
                </div>
                
                <div class="divider"></div>
                
                <div class="wedding-date">15 Июля 2026</div>
                
                <div class="divider"></div>
                
                <div class="details">
                    <div class="detail-item">
                        <div class="detail-icon">🕐</div>
                        <div class="detail-text">16:00</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">📍</div>
                        <div class="detail-text">
                            Ресторан "Золотой Дворец"<br>
                            <small>г. Алматы, пр. Достык 123</small>
                        </div>
                    </div>
                </div>
                
                <div class="divider"></div>
                
                <div class="message">
                    "Ваше присутствие сделает наш день ещё более незабываемым"
                </div>
                
                <div class="rsvp-mini">
                    <div class="rsvp-text">Подтвердите присутствие</div>
                    <div class="rsvp-phone">+7 702 417 5882</div>
                </div>
                
                <div class="floral-bottom">✿ ❀ ✿</div>
                
                <div class="footer">
                    <div class="footer-text">С любовью, Александр и Мария</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
